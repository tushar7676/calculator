<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─────────────────────────────────────────────
       CSS CUSTOM PROPERTIES (Design Tokens)
    ───────────────────────────────────────────── */
    :root {
      --bg:          #0d0d0f;
      --surface:     #16161a;
      --panel:       #1e1e24;
      --border:      #2a2a34;
      --accent:      #e8ff47;       /* electric chartreuse */
      --accent-dim:  #b8cc2f;
      --text-primary:#f0f0f0;
      --text-muted:  #6b6b7e;
      --btn-num:     #1e1e24;
      --btn-op:      #252530;
      --btn-eq:      var(--accent);
      --btn-clr:     #2a1a1a;
      --radius:      16px;
      --radius-sm:   10px;
      --shadow:      0 32px 80px rgba(0,0,0,0.6);
      --glow:        0 0 24px rgba(232,255,71,0.25);
    }

    /* ─────────────────────────────────────────────
       RESET & BASE
    ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      /* subtle grid texture */
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ─────────────────────────────────────────────
       CALCULATOR SHELL
    ───────────────────────────────────────────── */
    .calc-wrapper {
      position: relative;
    }

    /* Decorative glow blob behind the calc */
    .calc-wrapper::before {
      content: '';
      position: absolute;
      inset: -60px;
      background: radial-gradient(ellipse 60% 60% at 50% 50%,
                  rgba(232,255,71,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .calculator {
      position: relative;
      z-index: 1;
      width: 340px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      /* subtle top-edge highlight */
      background-image: linear-gradient(
        180deg,
        rgba(255,255,255,0.04) 0%,
        transparent 60px
      );
    }

    /* ─────────────────────────────────────────────
       DISPLAY AREA
    ───────────────────────────────────────────── */
    .display {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 20px 14px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    /* The running expression (top, small) */
    .display__expression {
      font-family: 'Syne Mono', monospace;
      font-size: 13px;
      color: var(--text-muted);
      min-height: 18px;
      text-align: right;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      /* animate expression slide-in */
      transition: color 0.2s;
    }

    /* The main number (bottom, large) */
    .display__main {
      font-family: 'Syne Mono', monospace;
      font-size: 48px;
      color: var(--text-primary);
      text-align: right;
      line-height: 1;
      letter-spacing: -0.02em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color 0.15s, transform 0.15s;
    }

    /* Visual feedback when result is shown */
    .display__main.result-flash {
      color: var(--accent);
      transform: scale(1.03);
    }

    /* Error state */
    .display__main.error {
      color: #ff6b6b;
      font-size: 32px;
    }

    /* ─────────────────────────────────────────────
       KEYBOARD HINT STRIP
    ───────────────────────────────────────────── */
    .kbd-hint {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .kbd-hint span {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: 'Syne Mono', monospace;
      letter-spacing: 0.03em;
    }

    /* ─────────────────────────────────────────────
       BUTTON GRID
    ───────────────────────────────────────────── */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    /* ─── Base Button ─── */
    button {
      all: unset;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 62px;
      border-radius: var(--radius-sm);
      font-size: 18px;
      font-weight: 400;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.01em;
      position: relative;
      overflow: hidden;
      transition:
        background 0.15s,
        box-shadow 0.15s,
        transform 0.1s,
        color 0.15s;
      /* top-edge shine */
      border: 1px solid transparent;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ripple pseudo-element */
    button::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at center, rgba(255,255,255,0.12), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    button:active::after { opacity: 1; }
    button:active        { transform: scale(0.93); }

    /* ── Digit buttons ── */
    .btn-num {
      background: var(--btn-num);
      color: var(--text-primary);
      border-color: var(--border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
      font-size: 20px;
    }
    .btn-num:hover {
      background: #27272f;
      border-color: #3a3a48;
    }

    /* ── Operator buttons ── */
    .btn-op {
      background: var(--btn-op);
      color: var(--accent);
      border-color: #35353f;
      font-size: 22px;
      font-weight: 500;
    }
    .btn-op:hover {
      background: #2e2e3c;
      box-shadow: 0 0 12px rgba(232,255,71,0.1);
    }

    /* ── Clear / special ── */
    .btn-clr {
      background: var(--btn-clr);
      color: #ff9090;
      border-color: #3a2222;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.05em;
    }
    .btn-clr:hover { background: #33181a; }

    .btn-del {
      background: var(--btn-num);
      color: #ff9090;
      border-color: var(--border);
      font-size: 16px;
    }
    .btn-del:hover { background: #27272f; }

    .btn-pct {
      background: var(--btn-num);
      color: var(--text-muted);
      border-color: var(--border);
    }
    .btn-pct:hover { background: #27272f; }

    /* ── Equals button ── */
    .btn-eq {
      background: var(--btn-eq);
      color: #111;
      font-size: 24px;
      font-weight: 500;
      border-color: transparent;
      box-shadow: var(--glow);
    }
    .btn-eq:hover {
      background: #f0ff70;
      box-shadow: 0 0 32px rgba(232,255,71,0.4);
    }
    .btn-eq:active { transform: scale(0.91); }

    /* ── Zero button spans 2 cols ── */
    .span-2 { grid-column: span 2; justify-content: flex-start; padding-left: 24px; }

    /* ── Active / pressed highlight (keyboard) ── */
    button.key-active {
      transform: scale(0.93);
      filter: brightness(1.2);
    }

    /* ─────────────────────────────────────────────
       FOOTER LABEL
    ───────────────────────────────────────────── */
    .calc-footer {
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: -4px;
    }

  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     HTML — CALCULATOR MARKUP
════════════════════════════════════════════════ -->
<div class="calc-wrapper">
  <div class="calculator" role="application" aria-label="Calculator">

    <!-- ── Display ── -->
    <div class="display" aria-live="polite" aria-atomic="true">
      <!-- Running expression / previous operand -->
      <div class="display__expression" id="expression" aria-label="Expression"></div>
      <!-- Current value / result -->
      <div class="display__main" id="mainDisplay" aria-label="Display">0</div>
    </div>

    <!-- ── Keyboard shortcut hints ── -->
    <div class="kbd-hint" aria-hidden="true">
      <span>0-9</span><span>+ - * /</span><span>Enter =</span>
      <span>Backspace ⌫</span><span>Esc C</span>
    </div>

    <!-- ── Button Grid ── -->
    <div class="btn-grid">

      <!-- Row 1: Utility -->
      <button class="btn-clr" data-action="clear"   aria-label="Clear all">AC</button>
      <button class="btn-del" data-action="delete"  aria-label="Delete last digit">⌫</button>
      <button class="btn-pct" data-action="percent" aria-label="Percent">%</button>
      <button class="btn-op"  data-action="op" data-value="÷" aria-label="Divide">÷</button>

      <!-- Row 2 -->
      <button class="btn-num" data-action="digit" data-value="7" aria-label="7">7</button>
      <button class="btn-num" data-action="digit" data-value="8" aria-label="8">8</button>
      <button class="btn-num" data-action="digit" data-value="9" aria-label="9">9</button>
      <button class="btn-op"  data-action="op" data-value="×" aria-label="Multiply">×</button>

      <!-- Row 3 -->
      <button class="btn-num" data-action="digit" data-value="4" aria-label="4">4</button>
      <button class="btn-num" data-action="digit" data-value="5" aria-label="5">5</button>
      <button class="btn-num" data-action="digit" data-value="6" aria-label="6">6</button>
      <button class="btn-op"  data-action="op" data-value="−" aria-label="Subtract">−</button>

      <!-- Row 4 -->
      <button class="btn-num" data-action="digit" data-value="1" aria-label="1">1</button>
      <button class="btn-num" data-action="digit" data-value="2" aria-label="2">2</button>
      <button class="btn-num" data-action="digit" data-value="3" aria-label="3">3</button>
      <button class="btn-op"  data-action="op" data-value="+" aria-label="Add">+</button>

      <!-- Row 5 -->
      <button class="btn-num span-2" data-action="digit" data-value="0" aria-label="0">0</button>
      <button class="btn-num" data-action="decimal" aria-label="Decimal point">.</button>
      <button class="btn-eq"  data-action="equals" aria-label="Equals">=</button>

    </div>

    <p class="calc-footer">DOM Calculator — Keyboard Enabled</p>
  </div>
</div>


<script>
/* ═══════════════════════════════════════════════
   JAVASCRIPT — CALCULATOR LOGIC
════════════════════════════════════════════════

   Architecture:
     • State object tracks all mutable data
     • Pure functions handle arithmetic & parsing
     • updateDisplay() syncs state → DOM
     • Event delegation on the grid + keyboard listener
═══════════════════════════════════════════════ */

"use strict";

/* ─────────────────────────────────────────────
   1. DOM REFERENCES
───────────────────────────────────────────── */
const mainDisplay  = document.getElementById("mainDisplay");
const expressionEl = document.getElementById("expression");
const btnGrid      = document.querySelector(".btn-grid");

/* ─────────────────────────────────────────────
   2. STATE
───────────────────────────────────────────── */
let state = {
  current:       "0",    // string currently shown in the large display
  expression:    "",     // full expression string shown above
  operator:      null,   // last operator pressed ("+", "−", "×", "÷")
  operand:       null,   // numeric value locked in before operator
  waitingForNext: false, // true after operator pressed; next digit starts fresh
  justEvaled:    false,  // true right after "=" so the next digit starts fresh
  hasError:      false,
};

/* ─────────────────────────────────────────────
   3. DISPLAY UPDATER
───────────────────────────────────────────── */
function updateDisplay(options = {}) {
  const { flash = false, error = false } = options;

  mainDisplay.textContent = state.current;

  /* Scale font size down for long numbers */
  const len = state.current.length;
  mainDisplay.style.fontSize =
    len > 12 ? "24px" :
    len > 9  ? "32px" :
    len > 6  ? "40px" : "48px";

  /* Update expression row */
  expressionEl.textContent = state.expression;

  /* CSS classes for animations */
  mainDisplay.classList.remove("result-flash", "error");
  if (flash) {
    /* Force reflow so the class re-triggers the transition */
    void mainDisplay.offsetWidth;
    mainDisplay.classList.add("result-flash");
    setTimeout(() => mainDisplay.classList.remove("result-flash"), 350);
  }
  if (error) {
    mainDisplay.classList.add("error");
  }
}

/* ─────────────────────────────────────────────
   4. SAFE ARITHMETIC (no eval)
───────────────────────────────────────────── */
/**
 * Performs a single binary operation on two numeric strings.
 * Returns a number or throws on division-by-zero / invalid input.
 */
function calculate(a, operator, b) {
  const numA = parseFloat(a);
  const numB = parseFloat(b);

  if (isNaN(numA) || isNaN(numB)) throw new Error("Invalid operands");

  switch (operator) {
    case "+": return numA + numB;
    case "−": return numA - numB;
    case "×": return numA * numB;
    case "÷":
      if (numB === 0) throw new Error("Division by zero");
      return numA / numB;
    default:
      throw new Error("Unknown operator");
  }
}

/**
 * Formats a result number into a clean display string.
 * Rounds floating-point noise (e.g. 0.1+0.2 = 0.30000…04 → "0.3").
 */
function formatResult(num) {
  if (!isFinite(num)) return "Error";
  /* Limit to 12 significant figures to avoid floating-point garbage */
  let str = parseFloat(num.toPrecision(12)).toString();
  /* Cap total character length */
  if (str.length > 15) str = parseFloat(num.toPrecision(9)).toString();
  return str;
}

/* ─────────────────────────────────────────────
   5. ACTION HANDLERS
───────────────────────────────────────────── */

/** Handle a digit (0-9) press */
function handleDigit(digit) {
  if (state.hasError) return;

  /* After "=" a new digit starts a brand-new expression */
  if (state.justEvaled) {
    state = { ...state, current: digit, expression: "", justEvaled: false, waitingForNext: false };
    updateDisplay();
    return;
  }

  /* After an operator, the next digit starts a fresh "current" */
  if (state.waitingForNext) {
    state.current       = digit;
    state.waitingForNext = false;
  } else {
    /* Append digit; guard against leading multiple zeros */
    if (state.current === "0" && digit !== ".") {
      state.current = digit;
    } else if (state.current.length < 15) { // max display length
      state.current += digit;
    }
  }

  updateDisplay();
}

/** Handle decimal point */
function handleDecimal() {
  if (state.hasError) return;
  if (state.justEvaled || state.waitingForNext) {
    state.current        = "0.";
    state.waitingForNext = false;
    state.justEvaled     = false;
  } else if (!state.current.includes(".")) {
    state.current += ".";
  }
  updateDisplay();
}

/** Handle operator (+, −, ×, ÷) */
function handleOperator(op) {
  if (state.hasError) return;

  /* If we already have a pending operation and the user hasn't entered a new
     number yet, just swap the operator */
  if (state.waitingForNext) {
    state.operator     = op;
    /* Update the expression label to reflect the swap */
    state.expression   = `${state.operand} ${op}`;
    expressionEl.textContent = state.expression;
    return;
  }

  /* If there's a pending operation, chain-evaluate it first */
  if (state.operator !== null && !state.justEvaled) {
    try {
      const result      = calculate(state.operand, state.operator, state.current);
      state.current     = formatResult(result);
    } catch (e) {
      showError(e.message);
      return;
    }
  }

  /* Lock in the current value as the left operand */
  state.operand        = state.current;
  state.operator       = op;
  state.expression     = `${state.current} ${op}`;
  state.waitingForNext = true;
  state.justEvaled     = false;

  updateDisplay();
}

/** Handle percent */
function handlePercent() {
  if (state.hasError) return;
  const val = parseFloat(state.current);
  if (isNaN(val)) return;
  state.current = formatResult(val / 100);
  updateDisplay();
}

/** Handle equals */
function handleEquals() {
  if (state.hasError) return;
  if (state.operator === null) return; // nothing to evaluate

  /* Build the complete expression for the label */
  const fullExpr = `${state.operand} ${state.operator} ${state.current} =`;

  try {
    const result   = calculate(state.operand, state.operator, state.current);
    const formatted = formatResult(result);

    state.expression   = fullExpr;
    state.current      = formatted;
    state.operator     = null;
    state.operand      = null;
    state.waitingForNext = false;
    state.justEvaled   = true;
    state.hasError     = false;

    updateDisplay({ flash: true });
  } catch (e) {
    showError(e.message);
  }
}

/** Handle all-clear */
function handleClear() {
  state = {
    current:       "0",
    expression:    "",
    operator:      null,
    operand:       null,
    waitingForNext: false,
    justEvaled:    false,
    hasError:      false,
  };
  updateDisplay();
}

/** Handle backspace / delete last digit */
function handleDelete() {
  if (state.hasError)     { handleClear(); return; }
  if (state.justEvaled)   return; // don't backspace into a result
  if (state.waitingForNext) return; // nothing to delete yet

  if (state.current.length <= 1 || (state.current.length === 2 && state.current.startsWith("-"))) {
    state.current = "0";
  } else {
    state.current = state.current.slice(0, -1);
  }
  updateDisplay();
}

/** Show an error state */
function showError(msg) {
  state.hasError       = true;
  state.current        = msg === "Division by zero" ? "Can't ÷ by 0" : "Error";
  state.expression     = "";
  state.operator       = null;
  state.waitingForNext = false;
  updateDisplay({ error: true });
}

/* ─────────────────────────────────────────────
   6. EVENT DELEGATION — Button Clicks
───────────────────────────────────────────── */
btnGrid.addEventListener("click", (e) => {
  const btn    = e.target.closest("button");
  if (!btn) return;

  const action = btn.dataset.action;
  const value  = btn.dataset.value;

  switch (action) {
    case "digit":   handleDigit(value);    break;
    case "decimal": handleDecimal();       break;
    case "op":      handleOperator(value); break;
    case "percent": handlePercent();       break;
    case "equals":  handleEquals();        break;
    case "clear":   handleClear();         break;
    case "delete":  handleDelete();        break;
  }
});

/* ─────────────────────────────────────────────
   7. KEYBOARD INPUT HANDLING
   Maps physical keys → calculator actions
───────────────────────────────────────────── */

/** Map a KeyboardEvent to a button action, or null if unrecognised */
function keyToAction(e) {
  const k = e.key;

  if (k >= "0" && k <= "9")                  return { action: "digit",   value: k };
  if (k === ".")                              return { action: "decimal" };
  if (k === "+" )                             return { action: "op",      value: "+" };
  if (k === "-" )                             return { action: "op",      value: "−" };
  if (k === "*" )                             return { action: "op",      value: "×" };
  if (k === "/" )  { e.preventDefault();      return { action: "op",      value: "÷" }; }
  if (k === "%")                              return { action: "percent" };
  if (k === "=" || k === "Enter")             return { action: "equals" };
  if (k === "Backspace")                      return { action: "delete" };
  if (k === "Escape" || k === "c" || k === "C") return { action: "clear" };

  return null;
}

document.addEventListener("keydown", (e) => {
  const mapped = keyToAction(e);
  if (!mapped) return;

  /* Trigger the logic */
  switch (mapped.action) {
    case "digit":   handleDigit(mapped.value);    break;
    case "decimal": handleDecimal();              break;
    case "op":      handleOperator(mapped.value); break;
    case "percent": handlePercent();              break;
    case "equals":  handleEquals();               break;
    case "clear":   handleClear();                break;
    case "delete":  handleDelete();               break;
  }

  /* Visual feedback: briefly highlight the matching button */
  const selector = mapped.value
    ? `[data-action="${mapped.action}"][data-value="${mapped.value}"]`
    : `[data-action="${mapped.action}"]`;
  const btn = btnGrid.querySelector(selector);
  if (btn) {
    btn.classList.add("key-active");
    setTimeout(() => btn.classList.remove("key-active"), 120);
  }
});

/* ─────────────────────────────────────────────
   8. INITIAL RENDER
───────────────────────────────────────────── */
updateDisplay();

</script>
</body>
</html>
